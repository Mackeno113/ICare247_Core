<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ICare247 UI</title>
    <base href="/" />
    <!-- DevExpress Fluent theme (lắp 4 file đúng thứ tự: global → core → mode → accent).
         Đổi accent: thay accents/blue.min.css bằng steel/storm/cool-blue… (11 màu).
         Đổi dark mode: thay modes/light.min.css bằng modes/dark.min.css. -->
    <link rel="stylesheet" href="_content/DevExpress.Blazor.Themes.Fluent/global.min.css" />
    <link rel="stylesheet" href="_content/DevExpress.Blazor.Themes.Fluent/core.min.css" />
    <link rel="stylesheet" href="_content/DevExpress.Blazor.Themes.Fluent/modes/light.min.css" />
    <link rel="stylesheet" href="_content/DevExpress.Blazor.Themes.Fluent/accents/blue.min.css" />
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="ICare247_UI.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // icare.focusField(fieldCode) — focus và scroll vào input có id="field_{fieldCode}"
        // Dùng sau submit để trỏ chuột vào field đầu tiên bị lỗi.
        window.icare = {
            focusField: function (fieldCode) {
                const el = document.getElementById('field_' + fieldCode);
                if (!el) return;
                el.focus();
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            },
            // setupNumericInput(inputId, locale) — format real-time khi user gõ vào DxSpinEdit.
            // DxSpinEdit.DisplayFormat chỉ áp dụng ở display mode (blur); cần JS cho edit mode.
            // locale: "vi"  → chuẩn VN  : 9.999,05  (chấm=nghìn, phẩy=thập phân)
            //         ""    → quốc tế   : 9,999.05  (phẩy=nghìn, chấm=thập phân)  [default]
            // Guard el._icareNumFmt tránh đăng ký listener trùng khi Blazor re-render.
            setupNumericInput: function (inputId, locale) {
                const el = document.getElementById(inputId);
                if (!el || el._icareNumFmt) return;
                el._icareNumFmt = true;

                const isVi = locale === 'vi';
                const tSep = isVi ? '.' : ',';   // thousand separator
                const dSep = isVi ? ',' : '.';   // decimal separator
                const tRe  = new RegExp('\\' + tSep, 'g');

                // Chuỗi đã format → số thuần (dùng '.' làm decimal nội bộ)
                function toRaw(str) {
                    return str.replace(tRe, '').replace(dSep, '.');
                }

                // Số thuần → chuỗi format theo locale
                function toFormatted(raw) {
                    const neg   = raw.startsWith('-');
                    const body  = neg ? raw.slice(1) : raw;
                    const parts = body.split('.');
                    parts[0]    = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, tSep);
                    return (neg ? '-' : '') + parts.join(dSep);
                }

                el.addEventListener('input', function () {
                    const sel    = this.selectionStart;
                    const oldVal = this.value;
                    const raw    = toRaw(oldVal);

                    // Bỏ qua khi đang gõ dở: rỗng, dấu âm, decimal đứng cuối, không hợp lệ
                    if (!raw || raw === '-' || raw.endsWith('.') || !/^-?\d*\.?\d*$/.test(raw)) return;

                    const formatted = toFormatted(raw);
                    if (formatted === oldVal) return;

                    // Giữ cursor: đếm ký tự không phải thousand-sep trước cursor
                    const charsBeforeCursor = oldVal.substring(0, sel).replace(tRe, '').length;
                    this.value = formatted;

                    let count = 0, newSel = formatted.length;
                    for (let i = 0; i < formatted.length; i++) {
                        if (formatted[i] !== tSep) count++;
                        if (count === charsBeforeCursor) { newSel = i + 1; break; }
                    }
                    this.setSelectionRange(newSel, newSel);
                });
            },
            // enableDrag(handle, panel) — cho phép kéo panel bằng cách giữ chuột/chạm trên handle.
            // Dùng cho DraggableModal: kéo theo thanh tiêu đề; bỏ qua khi bấm nút đóng (.dm-close).
            // Di chuyển bằng transform translate (panel đang được căn giữa bằng flex).
            enableDrag: function (handle, panel) {
                if (!handle || !panel || handle._icareDrag) return;
                let startX = 0, startY = 0, baseX = 0, baseY = 0, dragging = false;

                function getTranslate() {
                    const m = /translate\((-?\d+(?:\.\d+)?)px,\s*(-?\d+(?:\.\d+)?)px\)/.exec(panel.style.transform || '');
                    return m ? { x: parseFloat(m[1]), y: parseFloat(m[2]) } : { x: 0, y: 0 };
                }
                function point(e) { return e.touches && e.touches.length ? e.touches[0] : e; }

                function onMove(e) {
                    if (!dragging) return;
                    const p = point(e);
                    panel.style.transform =
                        'translate(' + (baseX + (p.clientX - startX)) + 'px, ' + (baseY + (p.clientY - startY)) + 'px)';
                    if (e.cancelable) e.preventDefault();
                }
                function onUp() {
                    dragging = false;
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                    document.removeEventListener('touchmove', onMove);
                    document.removeEventListener('touchend', onUp);
                }
                function onDown(e) {
                    if (e.target.closest && e.target.closest('.dm-close')) return; // nút đóng không kéo
                    dragging = true;
                    const t = getTranslate(); baseX = t.x; baseY = t.y;
                    const p = point(e); startX = p.clientX; startY = p.clientY;
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                    document.addEventListener('touchmove', onMove, { passive: false });
                    document.addEventListener('touchend', onUp);
                    if (e.cancelable) e.preventDefault();
                }

                handle.addEventListener('mousedown', onDown);
                handle.addEventListener('touchstart', onDown, { passive: false });
                handle._icareDrag = { onDown };
            },
            // disableDrag(handle) — gỡ listener kéo (gọi khi DraggableModal dispose).
            disableDrag: function (handle) {
                if (!handle || !handle._icareDrag) return;
                handle.removeEventListener('mousedown', handle._icareDrag.onDown);
                handle.removeEventListener('touchstart', handle._icareDrag.onDown);
                handle._icareDrag = null;
            },
            // downloadJson(filename, jsonText) — tạo blob và trigger download file .json
            downloadJson: function (filename, jsonText) {
                const blob = new Blob([jsonText], { type: 'application/json' });
                const url  = URL.createObjectURL(blob);
                const a    = document.createElement('a');
                a.href     = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            },
            // teleportPopup(anchor, popup) — đưa popup lookup ra <body> + định vị fixed dưới ô nhập.
            // Cần vì DraggableModal kéo-thả bằng transform (tạo containing-block) + overflow:auto
            // → mọi dropdown trong modal đều bị cắt, kể cả position:fixed. Lưu vị trí gốc để trả về.
            teleportPopup: function (anchor, popup) {
                if (!anchor || !popup) return;
                if (!popup._icareHome) {
                    popup._icareHome = { parent: popup.parentNode, next: popup.nextSibling };
                }
                document.body.appendChild(popup);
                popup.style.position = 'fixed';
                popup.style.margin   = '0';
                popup.style.zIndex   = '3000';   // nổi trên modal
                var place = function () {
                    var r = anchor.getBoundingClientRect();
                    // Mặc định bề rộng popup = bề rộng control (huỷ min-width:100% vốn = bề rộng body khi ở body).
                    popup.style.minWidth = r.width + 'px';
                    var w = popup.offsetWidth || r.width;
                    var left = Math.min(r.left, window.innerWidth - w - 8);  // không tràn mép phải
                    popup.style.left = Math.max(8, left) + 'px';
                    popup.style.top  = (r.bottom + 2) + 'px';
                };
                place();
                popup._icarePlace = place;
                window.addEventListener('scroll', place, true);
                window.addEventListener('resize', place);
            },
            // restorePopup(popup) — trả popup về đúng chỗ cũ trong DOM + gỡ listener.
            // Gọi TRƯỚC khi ẩn (Blazor sẽ remove node ở vị trí gốc → không lỗi diff). Idempotent.
            restorePopup: function (popup) {
                if (!popup) return;
                if (popup._icarePlace) {
                    window.removeEventListener('scroll', popup._icarePlace, true);
                    window.removeEventListener('resize', popup._icarePlace);
                    popup._icarePlace = null;
                }
                var home = popup._icareHome;
                if (home && home.parent) {
                    home.parent.insertBefore(popup, home.next);
                    popup._icareHome = null;
                }
                popup.style.position = popup.style.left = popup.style.top = '';
                popup.style.margin = popup.style.minWidth = popup.style.zIndex = '';
            }
        };
    </script>
</body>

</html>
