<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ICare247 UI</title>
    <base href="/" />
    <!-- DevExpress Fluent theme (lắp 4 file đúng thứ tự: global → core → mode → accent).
         Đổi accent: thay accents/blue.min.css bằng steel/storm/cool-blue… (11 màu).
         Đổi dark mode: thay modes/light.min.css bằng modes/dark.min.css. -->
    <link rel="stylesheet" href="_content/DevExpress.Blazor.Themes.Fluent/global.min.css" />
    <link rel="stylesheet" href="_content/DevExpress.Blazor.Themes.Fluent/core.min.css" />
    <link rel="stylesheet" href="_content/DevExpress.Blazor.Themes.Fluent/modes/light.min.css" />
    <link rel="stylesheet" href="_content/DevExpress.Blazor.Themes.Fluent/accents/blue.min.css" />
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="ICare247_UI.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // icare.focusField(fieldCode) — focus và scroll vào input có id="field_{fieldCode}"
        // Dùng sau submit để trỏ chuột vào field đầu tiên bị lỗi.
        window.icare = {
            focusField: function (fieldCode) {
                const el = document.getElementById('field_' + fieldCode);
                if (!el) return;
                el.focus();
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            },
            // setupNumericInput(inputId, locale) — format real-time khi user gõ vào DxSpinEdit.
            // DxSpinEdit.DisplayFormat chỉ áp dụng ở display mode (blur); cần JS cho edit mode.
            // locale: "vi"  → chuẩn VN  : 9.999,05  (chấm=nghìn, phẩy=thập phân)
            //         ""    → quốc tế   : 9,999.05  (phẩy=nghìn, chấm=thập phân)  [default]
            // Guard el._icareNumFmt tránh đăng ký listener trùng khi Blazor re-render.
            setupNumericInput: function (inputId, locale) {
                const el = document.getElementById(inputId);
                if (!el || el._icareNumFmt) return;
                el._icareNumFmt = true;

                const isVi = locale === 'vi';
                const tSep = isVi ? '.' : ',';   // thousand separator
                const dSep = isVi ? ',' : '.';   // decimal separator
                const tRe  = new RegExp('\\' + tSep, 'g');

                // Chuỗi đã format → số thuần (dùng '.' làm decimal nội bộ)
                function toRaw(str) {
                    return str.replace(tRe, '').replace(dSep, '.');
                }

                // Số thuần → chuỗi format theo locale
                function toFormatted(raw) {
                    const neg   = raw.startsWith('-');
                    const body  = neg ? raw.slice(1) : raw;
                    const parts = body.split('.');
                    parts[0]    = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, tSep);
                    return (neg ? '-' : '') + parts.join(dSep);
                }

                el.addEventListener('input', function () {
                    const sel    = this.selectionStart;
                    const oldVal = this.value;
                    const raw    = toRaw(oldVal);

                    // Bỏ qua khi đang gõ dở: rỗng, dấu âm, decimal đứng cuối, không hợp lệ
                    if (!raw || raw === '-' || raw.endsWith('.') || !/^-?\d*\.?\d*$/.test(raw)) return;

                    const formatted = toFormatted(raw);
                    if (formatted === oldVal) return;

                    // Giữ cursor: đếm ký tự không phải thousand-sep trước cursor
                    const charsBeforeCursor = oldVal.substring(0, sel).replace(tRe, '').length;
                    this.value = formatted;

                    let count = 0, newSel = formatted.length;
                    for (let i = 0; i < formatted.length; i++) {
                        if (formatted[i] !== tSep) count++;
                        if (count === charsBeforeCursor) { newSel = i + 1; break; }
                    }
                    this.setSelectionRange(newSel, newSel);
                });
            },
            // downloadJson(filename, jsonText) — tạo blob và trigger download file .json
            downloadJson: function (filename, jsonText) {
                const blob = new Blob([jsonText], { type: 'application/json' });
                const url  = URL.createObjectURL(blob);
                const a    = document.createElement('a');
                a.href     = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        };
    </script>
</body>

</html>
